name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
        lightrag-version: ["1.4.9", "1.4.9.11", "1.4.10", "1.4.11", "1.4.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install -e ".[test]"
          pip install "lightrag-hku==${{ matrix.lightrag-version }}"

      - name: Run unit tests
        run: pytest tests/test_register.py tests/test_record_to_entry.py tests/test_vector_missing_index.py tests/test_write_throttle.py tests/test_hooks.py tests/test_buffered_writes.py tests/test_batch_patch.py tests/test_pool_tuning.py tests/test_use_database.py tests/test_read_pool.py tests/test_delete_set_coercion.py tests/test_query_modes.py tests/test_consume_and_drop.py -v

  integration-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        lightrag-version: ["1.4.9", "1.4.9.11", "1.4.10", "1.4.11", "1.4.12"]
        memgraph-version: ["3.7.2", "3.8.0", "latest"]
    services:
      memgraph:
        image: memgraph/memgraph-mage:${{ matrix.memgraph-version }}
        ports:
          - 7687:7687
        options: >-
          --health-cmd "echo 'RETURN 1;' | mgconsole"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -e ".[test]"
          pip install "lightrag-hku==${{ matrix.lightrag-version }}"

      - name: Run integration tests
        env:
          MEMGRAPH_URI: bolt://localhost:7687
        run: pytest tests/ --ignore=tests/test_bench.py --ignore=tests/test_intelligence --ignore=tests/test_ontology_integration.py -v
